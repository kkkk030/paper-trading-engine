<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>페이퍼 트레이딩 대시보드</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>📊 페이퍼 트레이딩 대시보드</h1>
    <div class="row">
      <button id="refreshBtn">새로고침</button>
      <span id="updatedAt">-</span>
    </div>

    <section class="card" id="summary"></section>
    <section class="card">
      <h2>신호(시그널)</h2>
      <div id="signals"></div>
    </section>
    <section class="card">
      <h2>알림 (체결/이벤트)</h2>
      <div id="alerts"></div>
    </section>
    <section class="card">
      <h2>보유 포지션</h2>
      <div id="positions"></div>
    </section>
    <section class="card">
      <h2>최근 체결 내역 (20건)</h2>
      <div id="trades"></div>
    </section>
  </main>
  <script src="app.js?v=20260306-1"></script>
</body>
</html>
